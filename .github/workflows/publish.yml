name: Publish to npm

# Publishes n8n-nodes-rendex to npm with npm provenance attestation.
# Triggers when a version tag (e.g. v1.0.1) is pushed to this repository.
#
# Authentication uses npm Trusted Publishing (OIDC) — no long-lived tokens.
# Enable at https://www.npmjs.com/package/n8n-nodes-rendex/access → Trusted Publishers →
# add this repo (copperline-labs/rendex-n8n) with workflow filename "publish.yml".
#
# If Trusted Publishing isn't enabled, the workflow falls back to NPM_TOKEN
# when the secret is set in repo Settings → Secrets → Actions.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run lint + build only, do not publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write  # required for npm provenance + Trusted Publishing OIDC

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm to latest (Trusted Publishing OIDC needs npm >=11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        # --ignore-scripts skips native C++ compilation of transitive deps
        # (notably `isolated-vm`, pulled in via n8n-workflow) which fails to
        # build against current Node+V8 ABI. We only need n8n-workflow's
        # `.d.ts` types for the TypeScript build; we never execute its
        # runtime, so skipping the native compile is safe.
        run: npm install --ignore-scripts

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "OK: tag and package.json agree on $PKG_VERSION"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        if: github.event_name == 'push' || inputs.dry_run != true
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
